# Profile "dev": H2 file-based (du lieu luu trong folder data/, con thay trong H2 Console)
spring.datasource.url=jdbc:h2:file:./data/todo_app;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;AUTO_SERVER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# H2 Console: http://localhost:8080/h2-console
# JDBC URL trong H2 Console phai giong: jdbc:h2:file:./data/todo_app (hoac duong dan tuyet doi)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.hibernate.ddl-auto=update
